name: FunPay Auto-Raise

on:
  schedule:
    - cron: '1 */4 * * *'
  workflow_dispatch:

jobs:
  raise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Поднять лоты на FunPay
        env:
          GOLDEN_KEY: ${{ secrets.GOLDEN_KEY }}
          NODE_IDS:   ${{ secrets.NODE_IDS }}
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node raise.js
